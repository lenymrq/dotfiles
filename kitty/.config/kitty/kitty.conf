# BEGIN_KITTY_FONTS
font_family      family="IosevkaTerm Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
font_size 12
disable_ligatures always

# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME

# Shell
shell zsh

# Padding
window_padding_width 4

# Opacity
background_opacity 1

# Terminal bell
enable_audio_bell no
