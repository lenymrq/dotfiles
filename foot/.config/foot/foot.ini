font=monospace:pixelsize=16
font-size-adjustment=1
box-drawings-uses-font-glyphs=no
dpi-aware=no
pad=2x2

resize-delay-ms=0

word-delimiters=,│`|:"'()[]{}<>
selection-target=primary

initial-color-theme=dark
bold-text-in-bright=yes

underline-offset=2

[bell]
urgent=no
notify=no
visual=no

[url]
launch=xdg-open ${url}
osc8-underline=url-mode

[cursor]
style=block
blink=no

[key-bindings]
spawn-terminal=Control+Shift+Return
color-theme-toggle=Control+Shift+Tab

[mouse]
hide-when-typing=yes

[colors-dark]
cursor=111111 e5e5e5

foreground=e5e5e5
background=111111

regular0=000000 # black
regular1=cd0000 # red
regular2=00cd00 # green
regular3=cdcd00 # yellow
regular4=005fcd # blue
regular5=cd00cd # magenta
regular6=00cdcd # cyan
regular7=e5e5e5 # white

bright0=7f7f7f  # bright black
bright1=ff0000  # bright red
bright2=00ff00  # bright green
bright3=ffff00  # bright yellow
bright4=005fff  # bright blue
bright5=ff00ff  # bright magenta
bright6=00ffff  # bright cyan
bright7=ffffff  # bright white

selection-foreground=e5e5e5
selection-background=7f7f7f

[colors-light]
cursor=eeeeee 1a1a1a

foreground=1a1a1a
background=eeeeee

regular0=000000 # black
regular1=cd0000 # red
regular2=00cd00 # green
regular3=cdad00 # yellow
regular4=0000cd # blue
regular5=cd00cd # magenta
regular6=00cdcd # cyan
regular7=e5e5e5 # white

bright0=7f7f7f  # bright black
bright1=ff0000  # bright red
bright2=00ff00  # bright green
bright3=ffd700  # bright yellow
bright4=0000ff  # bright blue
bright5=ff00ff  # bright magenta
bright6=00ffff  # bright cyan
bright7=ffffff  # bright white

selection-foreground=1a1a1a
selection-background=7f7f7f
