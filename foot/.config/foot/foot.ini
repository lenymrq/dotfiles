# -*- conf -*-

font=JetBrainsMono Nerd Font Mono:size=14
font-size-adjustment=1
box-drawings-uses-font-glyphs=no
dpi-aware=no

initial-window-size-chars=80x24
pad=4x4 center
resize-delay-ms=0

bold-text-in-bright=no
word-delimiters=,│`|:"'()[]{}<>
selection-target=primary

[bell]
urgent=no
notify=no
visual=no

[url]
launch=xdg-open ${url}
osc8-underline=url-mode

[cursor]
style=block
color=eff1f5 dc8a78
blink=no

[colors]
foreground=4c4f69
background=eff1f5

regular0=5c5f77
regular1=d20f39
regular2=40a02b
regular3=df8e1d
regular4=1e66f5
regular5=ea76cb
regular6=179299
regular7=acb0be

bright0=6c6f85
bright1=d20f39
bright2=40a02b
bright3=df8e1d
bright4=1e66f5
bright5=ea76cb
bright6=179299
bright7=bcc0cc

16=fe640b
17=dc8a78

selection-foreground=4c4f69
selection-background=ccced7

search-box-no-match=dce0e8 d20f39
search-box-match=4c4f69 ccd0da

jump-labels=dce0e8 fe640b
urls=1e66f5

[key-bindings]
spawn-terminal=Control+Shift+Return

